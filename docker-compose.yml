services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - bitacora-data:/app/data
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - YOUTRACK_URL=${YOUTRACK_URL:-https://bitacora.youtrack.cloud}
      - INGEST_TOKEN=${INGEST_TOKEN}
    restart: unless-stopped

volumes:
  bitacora-data:
