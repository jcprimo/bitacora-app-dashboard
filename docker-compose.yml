services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - bitacora-data:/app/data
      - ${REPO_TEAM_PATH:-/home/bitacora-ops/repos/primo-engineering-team}/agents:/root/.claude/agents:ro
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - YOUTRACK_URL=${YOUTRACK_URL:-https://bitacora.youtrack.cloud}
      - INGEST_TOKEN=${INGEST_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_BASE_DIR=${REPO_BASE_DIR:-/home/bitacora-ops/repos}
      - REPO_DASHBOARD_PATH=${REPO_DASHBOARD_PATH}
      - REPO_IOS_PATH=${REPO_IOS_PATH}
      - REPO_PRIMO_PATH=${REPO_PRIMO_PATH}
      - REPO_TEAM_PATH=${REPO_TEAM_PATH}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - JOB_TIMEOUT_MS=${JOB_TIMEOUT_MS:-1800000}
    restart: unless-stopped

volumes:
  bitacora-data:
