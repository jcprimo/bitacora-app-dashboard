services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - bitacora-data:/app/data
      # Agent definitions (read-only)
      - ${HOST_TEAM_PATH:-/opt/bitacora/repos/primo-engineering-team}/agents:/root/.claude/agents:ro
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - YOUTRACK_URL=${YOUTRACK_URL:-https://bitacora.youtrack.cloud}
      - INGEST_TOKEN=${INGEST_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Repos are cloned fresh inside the container — no bind mounts needed
      - REPO_BASE_DIR=/repos
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - JOB_TIMEOUT_MS=${JOB_TIMEOUT_MS:-1800000}
    restart: unless-stopped

volumes:
  bitacora-data:
